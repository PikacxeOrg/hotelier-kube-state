apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hotelier-ingress
  namespace: hotelier
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  rules:
  - host: hotelier.local
    http:
      paths:
      - path: /identity(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: identity-service
            port:
              number: 80
      - path: /accommodation(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: accommodation-service
            port:
              number: 80
      - path: /availability(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: availability-service
            port:
              number: 80
      - path: /reservation(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: reservation-service
            port:
              number: 80
      - path: /rating(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: rating-service
            port:
              number: 80
      - path: /search(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: search-service
            port:
              number: 80
      - path: /notification(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: notification-service
            port:
              number: 80
      - path: /cdn(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: cdn-service
            port:
              number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: monitoring-ingress
  namespace: observability
spec:
  rules:
  - host: monitoring.local
    http:
      paths:
      - path: /prometheus
        pathType: Prefix
        backend:
          service:
            name: prometheus
            port:
              number: 9090
      - path: /grafana
        pathType: Prefix
        backend:
          service:
            name: grafana
            port:
              number: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rabbitmq-ingress
  namespace: databases
spec:
  rules:
  - host: rabbitmq.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: rabbitmq
            port:
              number: 15672
