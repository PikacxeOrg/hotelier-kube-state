apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: databases
data:
  01-create-dbs.sql: |
    CREATE DATABASE hotelier_accommodation;
    CREATE DATABASE hotelier_availability;
    CREATE DATABASE hotelier_identity;
    CREATE DATABASE hotelier_rating;
    CREATE DATABASE hotelier_reservation;
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: databases
type: Opaque
stringData:
  POSTGRES_USER: hotelier
  POSTGRES_PASSWORD: hotelier
  POSTGRES_DB: hotelierdb
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgresql
  namespace: databases
  labels:
    app: postgresql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
        envFrom:
        - secretRef:
            name: postgres-secret
        volumeMounts:
        - name: init-scripts
          mountPath: /docker-entrypoint-initdb.d
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi
      volumes:
      - name: init-scripts
        configMap:
          name: postgres-init
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: databases
spec:
  selector:
    app: postgresql
  ports:
  - port: 5432
    targetPort: 5432
  type: ClusterIP
