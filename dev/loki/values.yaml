replicaCount: 1
persistence:
  enabled: false
  size: 2Gi
  storageClassName: ""
resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

config:
  table_manager:
    retention_deletes_enabled: false
  ingester:
    lifecycler:
      ring:
        kvstore:
          store: inmemory
  schema_config:
    configs: []
grafana:
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
      - name: Loki
        type: loki
        access: proxy
        orgId: 1
        url: http://loki:3100
        isDefault: false  # ← CRITICAL
