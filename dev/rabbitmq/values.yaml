replicaCount: 1
image:
  registry: docker.io
  repository: bitnami/rabbitmq  # ← Bitnami image
  tag: "4.1.3-debian-12-r0"    # ← Stable tag from your Helm chart
  pullPolicy: IfNotPresent
management:
  enabled: true
auth:
  username: guest
  password: guest
resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi
persistence:
  enabled: false
volumePermissions:
  enabled: false  # ← Skips volume-permissions init container