apiVersion: apps/v1
kind: Deployment
metadata:
  name: accommodation-service
  namespace: hotelier
  labels:
    app: accommodation-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: accommodation-service
  template:
    metadata:
      labels:
        app: accommodation-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: accommodation-service
        image: hotelier-accommodation-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Development"
        - name: ASPNETCORE_URLS
          value: "http://+:8080"
        - name: ConnectionStrings__Default
          value: "Host=postgresql.databases.svc.cluster.local;Database=hotelier_accommodation;Username=hotelier;Password=hotelier;Port=5432"
        - name: Rabbit__Host
          value: "rabbitmq.databases.svc.cluster.local"
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: accommodation-service
  namespace: hotelier
spec:
  selector:
    app: accommodation-service
  ports:
  - port: 80
    targetPort: 8080
  type: ClusterIP
