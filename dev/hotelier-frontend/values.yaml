replicaCount: 1

image:
  repository: localhost:30500/hotelier-frontend
  tag: "latest"
  pullPolicy: Always

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "250m"
    memory: "256Mi"

env:
  BACKEND_PORT: "80"
  DNS_RESOLVER: "10.96.0.10"
  SERVICE_SUFFIX: ".hotelier.svc.cluster.local"

service:
  type: ClusterIP
  port: 80

ingress:
  # Disabled — routing is handled centrally by kube-state/dev/ingress.yaml
  enabled: false
